name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 后端：lint → typecheck → test ──────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: 安装依赖
        run: |
          pip install -r requirements.txt --break-system-packages
          pip install -r requirements-test.txt --break-system-packages

      - name: Lint — Ruff 检查
        run: ruff check app/

      - name: Format — Ruff 格式检查
        run: ruff format --check app/

      - name: 类型检查 — Pyright
        run: npx --yes --package pyright -- pyright app/ || true

      - name: 测试 — pytest + 覆盖率
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── 前端：lint → format-check → test → build ──────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: Lint — ESLint 检查
        run: npm run lint

      - name: Format — Prettier 格式检查
        run: npm run format:check

      - name: 单元测试 — Vitest + 覆盖率
        run: npm run test:coverage

      - name: 构建 — Vite
        run: npm run build

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── E2E 测试（依赖前端构建）─────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: E2E 测试
        run: npm run test:e2e

      - name: 上传 Playwright 报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
